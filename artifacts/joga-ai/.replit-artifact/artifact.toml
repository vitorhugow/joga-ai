kind = "web"
previewPath = "/"
title = "Joga AI"
version = "1.0.0"
id = "artifacts/joga-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21666

[services.development]
run = "pnpm --filter @workspace/joga-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/joga-ai", "run", "build" ]
publicDir = "artifacts/joga-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21666"
BASE_PATH = "/"
