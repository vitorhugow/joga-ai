      html,body,#root{background:#0A0F1A;color-scheme:dark;margin:0}
    </style>
    <script>
      (function () {
        var KEY = "joga-deploy-reload";
        function recover() {
          if (sessionStorage.getItem(KEY)) return;
          sessionStorage.setItem(KEY, "1");
          function reload() { window.location.reload(); }
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations()
              .then(function (regs) { return Promise.all(regs.map(function (r) { return r.unregister(); })); })
              .then(reload).catch(reload);
          } else reload();
        }
        window.addEventListener("vite:preloadError", function (e) { e.preventDefault(); recover(); });
        window.addEventListener("error", function (e) {
          var t = e.target;
          if (!t || !(t instanceof HTMLElement)) return;
          var src = t.getAttribute("src") || t.getAttribute("href");
          if (!src || src.indexOf("/assets/") === -1) return;
          recover();
        }, true);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
